<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4a35a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c4a35a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background aura -->
  <circle cx="200" cy="200" r="195" fill="url(#aura)"/>

  <!-- Recursive circular halos (3 levels) -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#c4a35a" stroke-width="0.3" opacity="0.12"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#c4a35a" stroke-width="0.4" opacity="0.15"/>
  <circle cx="200" cy="200" r="105" fill="none" stroke="#c4a35a" stroke-width="0.5" opacity="0.18"/>

  <!-- Sierpinski-style triangles radiating outward (8 directions) -->
  <!-- North -->
  <g opacity="0.18" stroke="#2c3e6b" fill="none" stroke-width="0.5">
    <polygon points="200,30 180,70 220,70"/>
    <polygon points="200,42 190,62 210,62"/>
    <polygon points="200,50 195,58 205,58"/>
  </g>
  <!-- South -->
  <g opacity="0.18" stroke="#2c3e6b" fill="none" stroke-width="0.5">
    <polygon points="200,370 180,330 220,330"/>
    <polygon points="200,358 190,338 210,338"/>
    <polygon points="200,350 195,342 205,342"/>
  </g>
  <!-- East -->
  <g opacity="0.18" stroke="#2c3e6b" fill="none" stroke-width="0.5">
    <polygon points="370,200 330,180 330,220"/>
    <polygon points="358,200 338,190 338,210"/>
    <polygon points="350,200 342,195 342,205"/>
  </g>
  <!-- West -->
  <g opacity="0.18" stroke="#2c3e6b" fill="none" stroke-width="0.5">
    <polygon points="30,200 70,180 70,220"/>
    <polygon points="42,200 62,190 62,210"/>
    <polygon points="50,200 58,195 58,205"/>
  </g>
  <!-- NE -->
  <g opacity="0.12" stroke="#c4a35a" fill="none" stroke-width="0.4" transform="rotate(45 200 200)">
    <polygon points="200,40 185,72 215,72"/>
    <polygon points="200,50 192,66 208,66"/>
  </g>
  <!-- SE -->
  <g opacity="0.12" stroke="#c4a35a" fill="none" stroke-width="0.4" transform="rotate(135 200 200)">
    <polygon points="200,40 185,72 215,72"/>
    <polygon points="200,50 192,66 208,66"/>
  </g>
  <!-- SW -->
  <g opacity="0.12" stroke="#c4a35a" fill="none" stroke-width="0.4" transform="rotate(225 200 200)">
    <polygon points="200,40 185,72 215,72"/>
    <polygon points="200,50 192,66 208,66"/>
  </g>
  <!-- NW -->
  <g opacity="0.12" stroke="#c4a35a" fill="none" stroke-width="0.4" transform="rotate(315 200 200)">
    <polygon points="200,40 185,72 215,72"/>
    <polygon points="200,50 192,66 208,66"/>
  </g>

  <!-- Branching tree fractals along cross arms -->
  <!-- Upward tree -->
  <g opacity="0.25" stroke="#c4a35a" stroke-linecap="round">
    <line x1="200" y1="105" x2="200" y2="80" stroke-width="1.2"/>
    <line x1="200" y1="90" x2="188" y2="72" stroke-width="0.8"/>
    <line x1="200" y1="90" x2="212" y2="72" stroke-width="0.8"/>
    <line x1="188" y1="72" x2="180" y2="58" stroke-width="0.5"/>
    <line x1="188" y1="72" x2="192" y2="58" stroke-width="0.5"/>
    <line x1="212" y1="72" x2="208" y2="58" stroke-width="0.5"/>
    <line x1="212" y1="72" x2="220" y2="58" stroke-width="0.5"/>
    <line x1="180" y1="58" x2="175" y2="48" stroke-width="0.3"/>
    <line x1="180" y1="58" x2="183" y2="48" stroke-width="0.3"/>
    <line x1="220" y1="58" x2="217" y2="48" stroke-width="0.3"/>
    <line x1="220" y1="58" x2="225" y2="48" stroke-width="0.3"/>
    <line x1="192" y1="58" x2="189" y2="48" stroke-width="0.3"/>
    <line x1="192" y1="58" x2="195" y2="48" stroke-width="0.3"/>
    <line x1="208" y1="58" x2="205" y2="48" stroke-width="0.3"/>
    <line x1="208" y1="58" x2="211" y2="48" stroke-width="0.3"/>
  </g>

  <!-- Downward tree -->
  <g opacity="0.25" stroke="#c4a35a" stroke-linecap="round">
    <line x1="200" y1="295" x2="200" y2="320" stroke-width="1.2"/>
    <line x1="200" y1="310" x2="188" y2="328" stroke-width="0.8"/>
    <line x1="200" y1="310" x2="212" y2="328" stroke-width="0.8"/>
    <line x1="188" y1="328" x2="180" y2="342" stroke-width="0.5"/>
    <line x1="188" y1="328" x2="192" y2="342" stroke-width="0.5"/>
    <line x1="212" y1="328" x2="208" y2="342" stroke-width="0.5"/>
    <line x1="212" y1="328" x2="220" y2="342" stroke-width="0.5"/>
    <line x1="180" y1="342" x2="175" y2="352" stroke-width="0.3"/>
    <line x1="180" y1="342" x2="183" y2="352" stroke-width="0.3"/>
    <line x1="220" y1="342" x2="217" y2="352" stroke-width="0.3"/>
    <line x1="220" y1="342" x2="225" y2="352" stroke-width="0.3"/>
  </g>

  <!-- Left tree -->
  <g opacity="0.25" stroke="#c4a35a" stroke-linecap="round">
    <line x1="145" y1="200" x2="120" y2="200" stroke-width="1.2"/>
    <line x1="130" y1="200" x2="112" y2="188" stroke-width="0.8"/>
    <line x1="130" y1="200" x2="112" y2="212" stroke-width="0.8"/>
    <line x1="112" y1="188" x2="98" y2="180" stroke-width="0.5"/>
    <line x1="112" y1="188" x2="98" y2="192" stroke-width="0.5"/>
    <line x1="112" y1="212" x2="98" y2="208" stroke-width="0.5"/>
    <line x1="112" y1="212" x2="98" y2="220" stroke-width="0.5"/>
    <line x1="98" y1="180" x2="88" y2="175" stroke-width="0.3"/>
    <line x1="98" y1="180" x2="88" y2="183" stroke-width="0.3"/>
    <line x1="98" y1="220" x2="88" y2="217" stroke-width="0.3"/>
    <line x1="98" y1="220" x2="88" y2="225" stroke-width="0.3"/>
  </g>

  <!-- Right tree -->
  <g opacity="0.25" stroke="#c4a35a" stroke-linecap="round">
    <line x1="255" y1="200" x2="280" y2="200" stroke-width="1.2"/>
    <line x1="270" y1="200" x2="288" y2="188" stroke-width="0.8"/>
    <line x1="270" y1="200" x2="288" y2="212" stroke-width="0.8"/>
    <line x1="288" y1="188" x2="302" y2="180" stroke-width="0.5"/>
    <line x1="288" y1="188" x2="302" y2="192" stroke-width="0.5"/>
    <line x1="288" y1="212" x2="302" y2="208" stroke-width="0.5"/>
    <line x1="288" y1="212" x2="302" y2="220" stroke-width="0.5"/>
    <line x1="302" y1="180" x2="312" y2="175" stroke-width="0.3"/>
    <line x1="302" y1="180" x2="312" y2="183" stroke-width="0.3"/>
    <line x1="302" y1="220" x2="312" y2="217" stroke-width="0.3"/>
    <line x1="302" y1="220" x2="312" y2="225" stroke-width="0.3"/>
  </g>

  <!-- THE CROSS — clean, solid, central -->
  <!-- Vertical beam -->
  <rect x="191" y="105" width="18" height="190" rx="1.5" fill="#2c3e6b"/>
  <!-- Horizontal beam -->
  <rect x="145" y="189" width="110" height="16" rx="1.5" fill="#2c3e6b"/>

  <!-- Gold inlay — thin cross within the cross -->
  <line x1="200" y1="110" x2="200" y2="290" stroke="#c4a35a" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="197" x2="250" y2="197" stroke="#c4a35a" stroke-width="1" opacity="0.4"/>

  <!-- Gold edge highlights -->
  <rect x="191" y="105" width="18" height="190" rx="1.5" fill="none" stroke="#c4a35a" stroke-width="0.4" opacity="0.3"/>
  <rect x="145" y="189" width="110" height="16" rx="1.5" fill="none" stroke="#c4a35a" stroke-width="0.4" opacity="0.3"/>

  <!-- Center intersection accent -->
  <circle cx="200" cy="197" r="6" fill="#c4a35a" opacity="0.25"/>
  <circle cx="200" cy="197" r="3" fill="#2c3e6b" opacity="0.6"/>
  <circle cx="200" cy="197" r="1.2" fill="#c4a35a" opacity="0.5"/>
</svg>